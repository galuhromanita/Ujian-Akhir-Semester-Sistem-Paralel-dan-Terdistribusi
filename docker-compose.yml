services:

  # ----------------------------------------------------------
  # Storage: PostgreSQL 16 - penyimpanan persisten idempotent
  # ----------------------------------------------------------
  storage:
    image: postgres:16-alpine
    container_name: uas_storage
    environment:
      POSTGRES_DB: logdb
      POSTGRES_USER: loguser
      POSTGRES_PASSWORD: logpassword
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U loguser -d logdb"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  # ----------------------------------------------------------
  # Broker: Redis 7 - message queue internal
  # ----------------------------------------------------------
  broker:
    image: redis:7-alpine
    container_name: uas_broker
    command: redis-server --appendonly yes --appendfsync everysec
    volumes:
      - broker_data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    restart: unless-stopped

  # ----------------------------------------------------------
  # Aggregator: FastAPI - API utama + consumer workers
  # ----------------------------------------------------------
  aggregator:
    build:
      context: ./aggregator
      dockerfile: Dockerfile
    image: uas-aggregator:latest
    container_name: uas_aggregator
    depends_on:
      storage:
        condition: service_healthy
      broker:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://loguser:logpassword@storage:5432/logdb"
      BROKER_URL: "redis://broker:6379"
      WORKER_COUNT: "3"
      LOG_LEVEL: "INFO"
      APP_ENV: "production"
    ports:
      - "8080:8080"
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  # ----------------------------------------------------------
  # Publisher: Simulator event (termasuk duplikasi intentional)
  # ----------------------------------------------------------
  publisher:
    build:
      context: ./publisher
      dockerfile: Dockerfile
    image: uas-publisher:latest
    container_name: uas_publisher
    depends_on:
      aggregator:
        condition: service_healthy
    environment:
      TARGET_URL: "http://aggregator:8080/publish"
      EVENT_COUNT: "1000"
      DUPLICATE_RATIO: "0.3"
      BATCH_SIZE: "50"
      DELAY_MS: "100"
      TOPICS: "sensor.temperature,sensor.humidity,system.cpu,system.memory,app.login"
    networks:
      - internal
    restart: "no"

# ----------------------------------------------------------
# Named volumes untuk persistensi data
# Data aman meski container dihapus/recreate
# ----------------------------------------------------------
volumes:
  pg_data:
    name: uas_pg_data
  broker_data:
    name: uas_broker_data

# ----------------------------------------------------------
# Jaringan internal - isolasi dari publik
# ----------------------------------------------------------
networks:
  internal:
    driver: bridge
    name: uas_internal_network
