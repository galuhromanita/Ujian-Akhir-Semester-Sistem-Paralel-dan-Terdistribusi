[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short --timeout=60
markers =
    slow: test yang memerlukan waktu lebih lama dari biasanya
    concurrency: test yang menguji race condition dan konkurensi
    persistence: test yang menguji persistensi data di database
